<header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">{{ .Site.Title }}</a>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
